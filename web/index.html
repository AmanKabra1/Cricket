<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/cricket.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LocalScore — live ball-by-ball cricket scoring for local tournaments and grounds: live scorecards, AI win-probability, tournaments, leaderboards and player stats." />
    <title>LocalScore — Local Cricket, Live</title>

    <!-- SEO: let Google index the site + know the canonical URL -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cricket-one-flax.vercel.app/" />
    <!-- Google Search Console verification: paste your token from the
         "HTML tag" method, then redeploy. (Leave until you have it.) -->
    <!-- <meta name="google-site-verification" content="PASTE_TOKEN_HERE" /> -->

    <!-- Structured data so Google can show a rich brand result -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "LocalScore",
      "url": "https://cricket-one-flax.vercel.app/",
      "description": "Real-time ball-by-ball cricket scoring, live scorecards, AI win-probability, tournaments, leaderboards and player stats — web and app.",
      "inLanguage": "en"
    }
    </script>

    <!-- Open Graph / link-preview image (LinkedIn, WhatsApp, etc.). Unfurlers
         need a PNG/JPG (NOT svg) at an absolute URL — export og-image.svg to a
         1200x630 og-image.png in /public, and replace the domain below with your
         real Vercel domain. Then re-scrape at linkedin.com/post-inspector. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LocalScore" />
    <meta property="og:title" content="LocalScore — Local Cricket, Live" />
    <meta property="og:description" content="Real-time ball-by-ball cricket scoring, live scorecards, AI win-probability, tournaments, leaderboards and push alerts — on web and app." />
    <meta property="og:url" content="https://cricket-one-flax.vercel.app/" />
    <meta property="og:image" content="https://cricket-one-flax.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LocalScore — Local Cricket, Live" />
    <meta name="twitter:description" content="Real-time ball-by-ball cricket scoring, live scorecards, AI win-probability and more — web and app." />
    <meta name="twitter:image" content="https://cricket-one-flax.vercel.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
