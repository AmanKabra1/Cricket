<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15803d"/>
      <stop offset="0.55" stop-color="#0b5126"/>
      <stop offset="1" stop-color="#042713"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- logo mark: cricket ball with seam -->
  <g transform="translate(90,86)">
    <circle cx="34" cy="34" r="34" fill="#dc2626" stroke="#ffffff" stroke-width="3"/>
    <path d="M14 20 q20 14 40 0 M14 48 q20 -14 40 0" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-dasharray="5 5"/>
  </g>
  <text x="180" y="130" font-size="40" font-weight="700" fill="#ffffff">LocalScore</text>

  <!-- headline -->
  <text x="90" y="300" font-size="118" font-weight="800" fill="#ffffff" letter-spacing="-2">Local Cricket,</text>
  <text x="90" y="410" font-size="118" font-weight="800" fill="#bbf7d0" letter-spacing="-2">Live.</text>

  <!-- subtitle -->
  <text x="92" y="470" font-size="33" fill="#dcfce7">Real-time ball-by-ball scoring · live scorecards · AI win-probability</text>

  <!-- feature pills -->
  <g font-size="24" font-weight="600" fill="#ffffff">
    <g transform="translate(92,508)">
      <rect width="220" height="50" rx="25" fill="#ffffff" fill-opacity="0.14"/>
      <text x="110" y="33" text-anchor="middle">Tournaments</text>
    </g>
    <g transform="translate(330,508)">
      <rect width="220" height="50" rx="25" fill="#ffffff" fill-opacity="0.14"/>
      <text x="110" y="33" text-anchor="middle">Leaderboards</text>
    </g>
    <g transform="translate(568,508)">
      <rect width="250" height="50" rx="25" fill="#ffffff" fill-opacity="0.14"/>
      <text x="125" y="33" text-anchor="middle">Push alerts</text>
    </g>
  </g>

  <!-- url -->
  <text x="90" y="600" font-size="26" font-weight="600" fill="#86efac">cricket-one-flax.vercel.app</text>

  <!-- big cricket ball -->
  <g transform="translate(1010,150)">
    <circle cx="0" cy="0" r="120" fill="#dc2626" stroke="#ffffff" stroke-width="6"/>
    <path d="M-96 -42 q96 50 192 0 M-96 42 q96 -50 192 0" stroke="#ffffff" stroke-width="5" fill="none" stroke-dasharray="13 13"/>
    <ellipse cx="-40" cy="-44" rx="34" ry="18" fill="#ffffff" fill-opacity="0.18"/>
  </g>
</svg>
