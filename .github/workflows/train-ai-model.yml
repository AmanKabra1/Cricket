name: Train AI win-probability model

# Nightly retrain: pull labelled ball-by-ball data from the live backend, train
# the win-probability model, and commit the artifact so the AI service picks it
# up on its next deploy. Also runnable on demand.
#
# Required repo secrets:
#   BACKEND_URL        e.g. https://localscore-backend.onrender.com
#   AI_TRAIN_EMAIL     a SUPER_ADMIN login (to read the training export)
#   AI_TRAIN_PASSWORD  that account's password

on:
  schedule:
    - cron: "30 2 * * *"   # 02:30 UTC nightly
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install training deps
        working-directory: ai-service
        run: pip install -r requirements.txt -r requirements-ml.txt

      - name: Fetch labelled training data from the backend
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          EMAIL: ${{ secrets.AI_TRAIN_EMAIL }}
          PASSWORD: ${{ secrets.AI_TRAIN_PASSWORD }}
        run: |
          set -e
          if [ -z "$BACKEND_URL" ]; then echo "BACKEND_URL secret is not set"; exit 1; fi

          # 1) Wake the (free-tier) backend — cold start can take ~60s.
          echo "Waking backend at $BACKEND_URL …"
          ready=""
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BACKEND_URL/health" || true)
            echo "  health attempt $i → HTTP $code"
            if [ "$code" = "200" ]; then ready=1; break; fi
            # 404 means this host isn't the API at all — don't waste time retrying.
            if [ "$code" = "404" ]; then
              echo "✗ $BACKEND_URL/health returned 404 — BACKEND_URL is not the backend API."
              echo "  Set it to your Render backend URL (open <url>/docs to verify FastAPI),"
              echo "  e.g. https://localscore-backend.onrender.com  (no trailing slash)."
              exit 1
            fi
            sleep 10
          done
          if [ -z "$ready" ]; then echo "Backend never returned 200 on /health."; exit 1; fi

          # 2) Log in (retry a couple of times), capturing status + body for debug.
          # Build the JSON with jq so special characters in the password are escaped.
          BODY=$(jq -n --arg e "$EMAIL" --arg p "$PASSWORD" '{email:$e,password:$p}')
          TOKEN=""
          for i in $(seq 1 3); do
            code=$(curl -s -o login.json -w "%{http_code}" --max-time 30 \
              -X POST "$BACKEND_URL/api/v1/auth/login" \
              -H "Content-Type: application/json" \
              -d "$BODY" || true)
            TOKEN=$(jq -r '.access_token // empty' login.json 2>/dev/null || true)
            echo "  login attempt $i → HTTP $code"
            [ -n "$TOKEN" ] && break
            sleep 5
          done
          if [ -z "$TOKEN" ]; then
            echo "Login failed (HTTP $code). Response body:"; cat login.json || true
            echo "→ Check AI_TRAIN_EMAIL/AI_TRAIN_PASSWORD are a real SUPER_ADMIN, and BACKEND_URL has no trailing slash."
            exit 1
          fi

          # 3) Pull the labelled training data.
          curl -s --max-time 120 "$BACKEND_URL/api/v1/admin/ai/training-data" \
            -H "Authorization: Bearer $TOKEN" -o ai-service/training_data.json
          rm -f login.json
          echo "Rows: $(jq -r '.count' ai-service/training_data.json)"

      - name: Train model
        working-directory: ai-service
        env:
          TRAINING_DATA_FILE: training_data.json
        run: python -m train.train_win_probability

      - name: Commit model if changed
        run: |
          rm -f ai-service/training_data.json
          if git -c core.filemode=false status --porcelain ai-service/models/win_probability.joblib | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f ai-service/models/win_probability.joblib
            git commit -m "chore(ai): nightly retrain win-probability model"
            git push
          else
            echo "No model change."
          fi
