name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Use SQLite in CI so no MySQL service is needed; the app is DB-portable.
      DATABASE_URL: sqlite+aiosqlite:///./ci.db
      SYNC_DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-test-secret
      RATE_LIMIT_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff
      - name: Lint (errors only)
        run: ruff check --select E9,F63,F7,F82 app
      - name: Run tests
        run: pytest -q
      - name: Migrations apply cleanly
        run: |
          rm -f ci.db
          ALEMBIC_DATABASE_URL=sqlite:///./ci.db alembic upgrade head

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build (tsc + vite)
        run: npm run build

  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
