name: Deploy AI to Hugging Face

# No local clone/push needed. This syncs the ai-service/ folder to your Hugging
# Face Docker Space whenever it changes (or run it manually from the Actions tab).
#
# ONE-TIME SETUP:
#  1. Create the Space (web): huggingface.co/new-space → SDK: Docker → CPU free →
#     Public → name it EXACTLY  localscore-ai
#  2. GitHub repo → Settings → Secrets and variables → Actions → New repository
#     secret → name: HF_TOKEN, value: your Hugging Face *write* token.
#  3. Confirm HF_USERNAME below matches your HF username, then push (or run this
#     workflow manually: Actions → "Deploy AI to Hugging Face" → Run workflow).

on:
  push:
    branches: [main]
    paths:
      - "ai-service/**"
      - ".github/workflows/deploy-hf.yml"
  workflow_dispatch: {}

env:
  HF_USERNAME: AK1B12B1      # ← your Hugging Face username (change if different)
  HF_SPACE: localscore-ai    # ← the Space name you created

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push ai-service to the HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Add a repo secret named HF_TOKEN (your HF write token)."
            exit 1
          fi
          cd ai-service
          # HF Spaces reject raw binaries (they want Xet/LFS). The AI service
          # auto-falls back to its built-in heuristic when no model file is
          # present, so we simply don't ship the .joblib — predictions still work.
          find . -name '*.joblib' -delete
          git init -q
          git checkout -q -b main
          git config user.email "ci@localscore.app"
          git config user.name "LocalScore CI"
          git add .
          git commit -q -m "Sync from GitHub @ ${GITHUB_SHA::7}"
          git push -f "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" main
          echo "✅ Synced. Space: https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"
