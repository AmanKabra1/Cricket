name: Keep alive

# Render's free tier sleeps a service after ~15 min idle (first request then
# takes 30–60s). This pings the backend (and AI) every ~10 min so they stay warm,
# which removes the cold-start delay you feel on the first action.
#
# Notes:
# - GitHub's scheduled runs can be delayed/throttled; for rock-solid uptime use a
#   dedicated free pinger too (UptimeRobot / cron-job.org) at 5-min intervals.
# - Keeping a free service always-on uses more of its monthly hours; fine for one
#   service. To truly remove sleep, upgrade that service to Render Starter.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -fsS --max-time 90 https://localscore-backend-l3ws.onrender.com/health || echo "backend waking…"
      - name: Ping AI service
        run: curl -fsS --max-time 90 https://localscore-ai.onrender.com/health || echo "ai waking or not deployed…"
