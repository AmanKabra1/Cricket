name: Keep alive

# ⚠️ SCHEDULE DISABLED ON PURPOSE. Pinging two Render free services every 10 min
# kept them BOTH running 24/7 (~1,460 instance-hours/month), which blew past
# Render's free 750-hour cap and SUSPENDED the services. Render free is meant to
# SLEEP when idle.
#
# Sustainable free setup:
#   • Let the backend SLEEP when idle (the web/app already retry through the
#     ~30–60s cold start). Don't keep it warm 24/7 on free.
#   • Run the AI service on a free Hugging Face Space (no monthly hour cap; sleeps
#     only after 48h idle) — see ai-service/README.md.
#
# Re-enable the schedule below ONLY for a SINGLE always-on (paid) service.

on:
  # schedule:
  #   - cron: "*/10 * * * *"   # re-enable only for ONE upgraded/always-on service
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend (manual only)
        run: curl -fsS --max-time 90 https://localscore-backend-l3ws.onrender.com/health || echo "backend waking…"
