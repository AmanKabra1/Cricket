name: Maintenance

# Periodic housekeeping: purge old completed matches, expire stale admin
# accounts, and send pre-match reminder emails. Calls the token-protected
# maintenance endpoint (no DB access needed from CI).
#
# Setup: add a GitHub Actions secret MAINTENANCE_TOKEN equal to the backend's
# MAINTENANCE_TOKEN env value (Render auto-generates it — copy it from the
# service's Environment tab).

on:
  schedule:
    - cron: "0 * * * *" # hourly (reminders are time-sensitive; cleanup is idempotent)
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger maintenance
        env:
          TOKEN: ${{ secrets.MAINTENANCE_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "MAINTENANCE_TOKEN secret not set — skipping."; exit 0
          fi
          curl -fsS -X POST \
            -H "X-Maintenance-Token: $TOKEN" \
            --max-time 120 \
            https://localscore-backend-l3ws.onrender.com/api/v1/maintenance/run
