# Render Blueprint — backend + AI service + Redis.
# DB is external (TiDB Cloud); web is deployed on Vercel (see web/vercel.json).
#
# Deploy: Render Dashboard → New → Blueprint → point at this repo. Render reads
# this file, provisions the services, and auto-deploys on every push to main.
# Fill the `sync: false` secrets in the dashboard (they are never stored in git).

services:
  # ---------------- Core backend (REST + Socket.IO) ----------------
  - type: web
    name: localscore-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free # V1 on free tier (sleeps after ~15min idle); bump to "starter" for always-on
    healthCheckPath: /health
    autoDeploy: true
    # Render injects $PORT; run migrations then boot the ASGI app (REST + WS).
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:socket_app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        sync: false # e.g. https://localscore.vercel.app
      # TiDB Cloud connection strings (async for app, sync for Alembic).
      - key: DATABASE_URL
        sync: false # mysql+aiomysql://user:pass@host:4000/localscore?ssl_mode=VERIFY_IDENTITY
      - key: SYNC_DATABASE_URL
        sync: false # mysql+pymysql://user:pass@host:4000/localscore
      - key: DB_SSL
        value: "true" # TiDB Cloud requires TLS

      - key: REDIS_URL
        fromService:
          type: redis
          name: localscore-redis
          property: connectionString
      - key: AI_SERVICE_URL
        sync: false # internal URL of the AI service, e.g. http://localscore-ai:10000
      # Object storage (AWS S3 in prod).
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: RATE_LIMIT_ENABLED
        value: "true"

  # ---------------- AI microservice ----------------
  - type: web
    name: localscore-ai
    runtime: docker
    rootDir: ai-service
    dockerfilePath: ./Dockerfile
    plan: free # V1 on free tier (sleeps after ~15min idle); bump to "starter" for always-on
    healthCheckPath: /health
    autoDeploy: true
    dockerCommand: sh -c "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false # optional; templates used when empty
      - key: MODEL_DIR
        value: models

  # ---------------- Redis (cache + Socket.IO pub/sub) ----------------
  - type: redis
    name: localscore-redis
    plan: free # V1 on free tier (sleeps after ~15min idle); bump to "starter" for always-on
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # internal only — reachable by the services above
